# =============================================================================
# application-dev.yml — Local development
# Activate: spring.profiles.active=dev  hoặc  SPRING_PROFILES_ACTIVE=dev
#
# - H2 in-memory (không cần PostgreSQL cài local)
# - ddl-auto=create-drop: Hibernate tự tạo schema từ entity khi start, xoá khi stop
# - KHÔNG cần chạy script SQL thủ công
# =============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:xuser_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console   # truy cập tại http://localhost:8081/h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # KHÔNG set default_schema khi dùng H2
        # H2 dùng schema mặc định, không cần prefix "public."
        default_schema:

server:
  port: 8081

x-user:
  jwt:
    secret: "dev-only-secret-key-64-characters-long-do-not-use-in-production!!"
    access-ttl-seconds: 3600    # 1 giờ cho tiện debug
    refresh-ttl-seconds: 86400  # 1 ngày

  security:
    allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:4000"

logging:
  level:
    root: DEBUG
    com.htv.xuser: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE