# =============================================================================
# application.yml — x-user service  |  Spring Boot 3.4.1  |  Java 21
# =============================================================================

spring:
  application:
    name: x-user-service

  # ── JPA ──────────────────────────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  # ── Liquibase ─────────────────────────────────────────────────────────────────
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # ── Cache ─────────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000      # 10 phút mặc định cho cache entries
      cache-null-values: false

  # ── Kafka ─────────────────────────────────────────────────────────────────────
#  kafka:
#    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
#    producer:
#      key-serializer: org.apache.kafka.common.serialization.StringSerializer
#      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
#      acks: all
#      retries: 3
#      properties:
#        enable.idempotence: true
#        max.in.flight.requests.per.connection: 1
#    consumer:
#      group-id: x-user-service
#      auto-offset-reset: earliest
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
#      properties:
#        spring.json.trusted.packages: "com.htv.*"

# ── gRPC server ───────────────────────────────────────────────────────────────
spring.grpc:
  server:
    port: ${GRPC_PORT:9090}

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.htv.xuser: DEBUG
    org.springframework.security: INFO

# =============================================================================
# APP CONFIG — JWT + Security
# =============================================================================
x-user:
  # ── JWT ────────────────────────────────────────────────────────────────────
  jwt:
    # HMAC-SHA512 secret — min 64 ký tự (512 bits).
    # Production: inject từ ENV var hoặc Vault.
    # Dev: dùng giá trị placeholder (sẽ fail validation nếu ngắn hơn 64 chars)
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm}

    # Access token: 15 phút
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}

    # Refresh token: 7 ngày
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:604800}

    # MFA pending token: 5 phút
    mfa-pending-ttl-seconds: ${JWT_MFA_PENDING_TTL:300}

    # Password reset token: 1 giờ
    password-reset-ttl-seconds: ${JWT_PASSWORD_RESET_TTL:3600}

    # Email verify token: 24 giờ
    email-verify-ttl-seconds: ${JWT_EMAIL_VERIFY_TTL:86400}

    # Issuer claim (iss) trong JWT
    issuer: ${JWT_ISSUER:x-user-service}

  # ── Security ───────────────────────────────────────────────────────────────
  security:
    # Số lần sai mật khẩu tối đa trước khi khóa tài khoản
    max-failed-login-attempts: ${MAX_FAILED_LOGIN:5}

    # Thời gian khóa tài khoản (giây) sau khi vượt quá số lần sai
    account-lock-duration-seconds: ${ACCOUNT_LOCK_DURATION:900}   # 15 phút

    # Thời gian chờ giữa 2 lần gửi email (giây) — chống spam
    email-resend-cooldown-seconds: ${EMAIL_RESEND_COOLDOWN:60}

    # CORS origins được phép (phân cách bằng dấu phẩy)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4000}