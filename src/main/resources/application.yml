## x-user App Config
## =============================================================================
#x-user:
#
#  jwt:
#    # HMAC-SHA512 secret — min 64 ký tự (512 bits).
#    # Production: inject từ ENV var hoặc Vault.
#    # Dev: dùng giá trị placeholder (sẽ fail validation nếu ngắn hơn 64 chars)
#    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm}
#
#    # Access token: 15 phút
#    access-ttl-seconds: ${JWT_ACCESS_TTL:900}
#
#    # Refresh token: 7 ngày
#    refresh-ttl-seconds: ${JWT_REFRESH_TTL:604800}
#
#    # MFA pending token: 5 phút
#    mfa-pending-ttl-seconds: ${JWT_MFA_PENDING_TTL:300}
#
#    # Password reset token: 1 giờ
#    password-reset-ttl-seconds: ${JWT_PASSWORD_RESET_TTL:3600}
#
#    # Email verify token: 24 giờ
#    email-verify-ttl-seconds: ${JWT_EMAIL_VERIFY_TTL:86400}
#
#    # Issuer claim (iss) trong JWT
#    issuer: ${JWT_ISSUER:x-user-service}
#
#  # ── Security ───────────────────────────────────────────────────────────────
#  security:
#    # Số lần sai mật khẩu tối đa trước khi khóa tài khoản
#    max-failed-login-attempts: ${MAX_FAILED_LOGIN:5}
#
#    # Thời gian khóa tài khoản (giây) sau khi vượt quá số lần sai
#    account-lock-duration-seconds: ${ACCOUNT_LOCK_DURATION:900}   # 15 phút
#
#    # Thời gian chờ giữa 2 lần gửi email (giây) — chống spam
#    email-resend-cooldown-seconds: ${EMAIL_RESEND_COOLDOWN:60}
#
#    # CORS origins được phép (phân cách bằng dấu phẩy)
#    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4000}
# =============================================================================
# application-dev.yml — Local development
# Activate: spring.profiles.active=dev  hoặc  SPRING_PROFILES_ACTIVE=dev
#
# - H2 in-memory (không cần PostgreSQL cài local)
# - ddl-auto=create-drop: Hibernate tự tạo schema từ entity khi start, xoá khi stop
# - KHÔNG cần chạy script SQL thủ công
# =============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:xuser_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console   # truy cập tại http://localhost:8081/h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # KHÔNG set default_schema khi dùng H2
        # H2 dùng schema mặc định, không cần prefix "public."
        default_schema:

server:
  port: 8081
  servlet:
    context-path: /x-user

x-user:
  jwt:
    secret: "dev-only-secret-key-64-characters-long-do-not-use-in-production!!"
    access-ttl-seconds: 3600    # 1 giờ cho tiện debug
    refresh-ttl-seconds: 86400  # 1 ngày

  security:
    allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:4000"

logging:
  level:
    root: INFO
    com.htv.xuser: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE