# =============================================================================
# application-test.yml — Test profile
# Dùng H2 in-memory, không cần PostgreSQL / Redis / Kafka thật.
# Active bằng: @ActiveProfiles("test") hoặc -Dspring.profiles.active=test
# =============================================================================

spring:

  datasource:
    url: jdbc:h2:mem:xuser_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none          # Liquibase quản lý schema
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    # context "test" → chạy tất cả changeset KHÔNG có "context: !test"
    # Các changeset seed data có "context: !test" sẽ bị bỏ qua
    # Các changeset OWNER TO có "context: prod" cũng bị bỏ qua
    contexts: test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.grpc:
  server:
    port: 0

server:
  port: 0

x-user:
  jwt:
    secret: "test-secret-key-exactly-64-chars-long-for-hs512-algorithm-test!!"
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 86400
    mfa-pending-ttl-seconds: 300
    password-reset-ttl-seconds: 3600
    email-verify-ttl-seconds: 86400
    issuer: x-user-service-test

  security:
    max-failed-login-attempts: 5
    account-lock-duration-seconds: 900
    email-resend-cooldown-seconds: 60
    allowed-origins: "http://localhost:3000"

logging:
  level:
    root: WARN
    com.htv.xuser: DEBUG
    org.springframework.security: WARN
    liquibase: WARN